name: Sync obsidian-vault submodule

on:
  # 每 5 分钟检查 vault 上游（pointer 落后时 bump 并触发 Pages 重建）
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
  repository_dispatch:
    types: [vault-updated]

concurrency:
  group: sync-vault
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update-submodule:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo (with submodule)
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update submodule to remote HEAD
        id: update
        run: |
          set -e
          PINNED=$(git ls-tree HEAD obsidian-vault | awk '{print $3}')
          echo "pinned_sha=${PINNED}" >> "$GITHUB_OUTPUT"

          cd obsidian-vault
          git fetch origin
          DEFAULT_BRANCH=$(git remote show origin | sed -n '/HEAD branch/s/.*: //p')
          DEFAULT_BRANCH=${DEFAULT_BRANCH:-main}
          REMOTE_SHA=$(git rev-parse "origin/${DEFAULT_BRANCH}")
          git checkout --detach "$REMOTE_SHA"
          cd ..

          echo "new_sha=${REMOTE_SHA}" >> "$GITHUB_OUTPUT"
          echo "branch=${DEFAULT_BRANCH}" >> "$GITHUB_OUTPUT"

          if [ "${PINNED}" = "${REMOTE_SHA}" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "vault pointer already up to date (${PINNED})"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "vault pointer stale: ${PINNED} -> ${REMOTE_SHA}"
          fi

      - name: Setup Node
        if: steps.update.outputs.changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Rebuild notes-mtime manifest
        if: steps.update.outputs.changed == 'true'
        run: |
          node scripts/build-mtime-manifest.mjs
          node scripts/build-vault-sync-meta.mjs

      - name: Commit & push if updated
        if: steps.update.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add obsidian-vault src/lib/notes-mtime.json src/lib/vault-sync-meta.json
          git diff --cached --quiet && echo "nothing to commit" && exit 0
          git commit -m "chore(vault): auto-sync submodule ${{ steps.update.outputs.new_sha }}"
          git pull --rebase origin main || git pull --rebase origin master
          git push

      - name: Summary
        run: |
          echo "## Vault sync summary" >> $GITHUB_STEP_SUMMARY
          echo "- pinned SHA: \`${{ steps.update.outputs.pinned_sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- remote SHA: \`${{ steps.update.outputs.new_sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- branch: \`${{ steps.update.outputs.branch }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- updated: \`${{ steps.update.outputs.changed }}\`" >> $GITHUB_STEP_SUMMARY
